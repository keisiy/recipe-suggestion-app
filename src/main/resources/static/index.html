<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>レシピ提案アプリ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 45%;
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 8px;
        }

        .label {
            font-weight: bold;
            color: #555;
        }

        .error-message {
            color: #d9534f;
            font-size: 14px;
            margin-top: 8px;
            margin-bottom: 8px;
            min-height: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>レシピ提案アプリ</h1>

    <div class="container">
        <input type="text" id="ingredient1" placeholder="食材1">
        <input type="text" id="ingredient2" placeholder="食材2">

        <div id="error-message" class="error-message"></div>

        <button onclick="getRecipe()">レシピ取得</button>

        <div class="result" id="result">
            ここに結果が表示されます
        </div>
    </div>

    <script>
        async function getRecipe() {
            const i1 = document.getElementById("ingredient1").value;
            const i2 = document.getElementById("ingredient2").value;

            const errorMessage = document.getElementById("error-message");
            const result = document.getElementById("result");

            errorMessage.textContent = "";

            const response = await fetch(
                `/api/recipes?ingredient1=${encodeURIComponent(i1)}&ingredient2=${encodeURIComponent(i2)}`
            );

            const data = await response.json();

            if (!data.success) {
                errorMessage.textContent = data.message;
                result.innerHTML = "ここに結果が表示されます";
                return;
            }

            result.innerHTML =
                `<div><b>料理名:</b> ${data.recipeName}</div>
                <div><b>材料:</b> ${data.ingredients.join(", ")}</div>
                <div><b>手順:</b> ${data.steps}</div>`;
        }
    </script>

</body>
</html>
